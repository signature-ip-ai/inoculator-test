name: Nightly Generate RTL

on:
  schedule:
    - cron: "0 22 * * *"   # 10 PM UTC every night 
  workflow_dispatch:        

jobs:
  generate-rtl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install dependencies ───────────────────────────────────
      - name: Install Python packages
        run: pip install playwright pandas openpyxl

      - name: Install Playwright browsers
        run: playwright install chromium

      # ── 4. Place Excel file (from repo or secret) ─────────────────
   
      # ── 5. Run the automation ─────────────────────────────────────
      - name: Run RTL automation
        env:
          INOCULATOR_EMAIL:    ${{ secrets.INOCULATOR_EMAIL }}
          INOCULATOR_PASSWORD: ${{ secrets.INOCULATOR_PASSWORD }}
          EXCEL_PATH:          generateRTLtest.xlsx
        run: python generate_rtl.py

      # ── 6. Upload artifacts (Excel result + logs) ─────────────────
      - name: Upload results & logs
        if: always()   # upload even if the script fails
        uses: actions/upload-artifact@v4
        with:
          name: rtl-results-${{ github.run_number }}
          path: |
            generateRTLtest.xlsx
            logs/
          retention-days: 30
